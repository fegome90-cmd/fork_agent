openapi: 3.0.3
info:
  title: Fork Agent API
  description: |
    API REST para gestionar procesos fork_agent via PM2.
    
    ## Autenticación
    Todas las endpoints requieren API Key en el header `X-API-Key`.
    
    ## Rate Limiting
    - 60 requests/minuto por defecto
    - Headers: `X-RateLimit-Remaining`, `X-RateLimit-Reset`
  version: 1.0.0
  contact:
    name: Fork Agent Team
servers:
  - url: http://127.0.0.1:8080
    description: Servidor local
  - url: https://api.fork-agent.example.com
    description: Servidor de producción

security:
  - ApiKeyAuth: []

paths:
  /api/v1/health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: API funcionando
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string

  /api/v1/agents/sessions:
    get:
      summary: Listar sesiones
      tags: [Agents]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Lista de sesiones
    post:
      summary: Crear sesión
      tags: [Agents]
      responses:
        '201':
          description: Sesión creada

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API Key para autenticación
