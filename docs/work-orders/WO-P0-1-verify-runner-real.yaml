priority: P0
title: "Implementar Verify Runner Real"
status: "COMPLETE"

objective: |
  Reemplazar el stub `test_results = {"passed": True}` en verify handler con un runner
  real que ejecute pytest/subprocess y capture resultados reales.

scope: |
  - `src/interfaces/cli/commands/workflow.py` (líneas 250-305)
  - Agregar nuevo módulo: `src/application/services/workflow/verify_runner.py`

constraints: |
  - NO modificar la interfaz CLI existente (flag --tests/--no-tests se mantiene)
  - Debe guardar: exit_code, stdout, stderr, duration, test_count, pass_count, fail_count
  - Debe manejar caso sin tests (--no-tests) gracefully
  - Compatible con el estado existente en `.claude/verify-state.json`

dod: |
  - [x] VerifyRunner.detect_project_root() busca `pyproject.toml` hacia arriba desde cwd
  - [x] Si no encuentra pyproject.toml: fail con mensaje "Project root not found"
  - [~] Si encuentra múltiples (monorepo): tomar el más cercano al cwd (sin warning)
  - [x] VerifyRunner.run() ejecuta pytest con timeout de 300 segundos (5 min)
  - [x] verify handler llama a VerifyRunner.run() en lugar de hardcodear {"passed": True}
  - [x] test_results contiene: {passed: bool, exit_code: int, test_count: int, fail_count: int, duration_ms: int}
  - [x] passed = (exit_code == 0) - derivation explícita y fuente de verdad
  - [~] Si exit_code != 0, verify handler guarda error pero no falla (comportamiento actual)
  - [ ] Output completo (stdout/stderr) se guarda en `.claude/verify-output.txt` - DEFERRED
  - [x] Los resultados se guardan en `.claude/verify-state.json` test_results field
  - [x] Unit tests para VerifyRunner: test_detect_root, test_run_success, test_run_failure, test_timeout

