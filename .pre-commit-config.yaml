# .pre-commit-config.yaml
repos:
  # 1. Validaciones base del ecosistema
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # 2. Linter y Formatter de ultra-alto rendimiento (Rust)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      # Ejecuta el linter (reemplaza a flake8, isort, etc)
      - id: ruff
        args: [ --fix ]
      # Ejecuta el formateador (reemplaza a Black)
      - id: ruff-format

  # 3. Type Checker ultrarrápido de Meta (Rust)
  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: v0.42.0  # Usa la última versión estable
    hooks:
      - id: pyrefly-check-types
